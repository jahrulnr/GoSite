# Isolated nginx config for per-site syntax tests (nginx -t).
# Logging format and defaults come from custom.d/nginx-log.conf.

user apps;
worker_processes 1;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	server_tokens off;
	client_max_body_size 50m;

	include /etc/nginx/custom.d/nginx-log.conf;

	access_log /storage/logs/nginx-test-access.log main;
	error_log /storage/logs/nginx-test-error.log warn;

	include /etc/nginx/custom.d/vts.conf;

	include /storage/webconfig/site.d/*.conf;
}
