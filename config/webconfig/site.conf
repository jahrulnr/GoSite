# Per-site static vhost. Log format "main" is defined in custom.d/nginx-log.conf.
server {
	listen 80;
	server_name <domain>;

	location ~* ^/.well-known/ {
		allow all;
		log_not_found off;
	}

	if ($host = <domain>) {
		return 307 https://$host$request_uri;
	}
	return 404;
}

server {
	listen 443 quic reuseport;
	listen 443 ssl;
	listen [::]:443 quic reuseport;
	listen [::]:443 ssl;
	http2 on;
	server_name <domain>;
	ssl_certificate <ssl_cert>;
	ssl_certificate_key <ssl_key>;

	add_header Alt-Svc 'h3=":443"; ma=86400' always;

	root <path>;
	index index.html;
	access_log /storage/logs/access-<domain>.log main;
	error_log /storage/logs/error-<domain>.log warn;

	location = /favicon.ico {
		log_not_found off;
		access_log off;
		error_log off;
	}

	location = /robot.txt {
		log_not_found off;
		access_log off;
		error_log off;
	}

	location ~ (^|/)\. {
		return 403;
	}
}
