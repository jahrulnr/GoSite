# Per-site reverse-proxy vhost. Log format "main" is defined in custom.d/nginx-log.conf.
server {
	listen 80;
	server_name <domain>;

	location ~* ^/.well-known/ {
		allow all;
		log_not_found off;
	}

	if ($host = <domain>) {
		return 307 https://$host$request_uri;
	}
	return 404;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name <domain>;
	ssl_certificate <ssl_cert>;
	ssl_certificate_key <ssl_key>;

	add_header Alt-Svc 'h3=":443"; ma=86400' always;

	access_log /storage/logs/access-<domain>.log main;
	error_log /storage/logs/error-<domain>.log warn;

	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;

	location / {
		proxy_pass <upstream>;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
	}
}
