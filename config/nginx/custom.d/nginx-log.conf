# GoSite standard nginx logging — single source of truth.
#
# Layout under /storage/logs/:
#   access.log, error.log              global default vhost
#   access-<domain>.log, error-<domain>.log   per-site vhosts (see site.conf templates)
#   gosite.log, gosite-error.log       panel process (supervisord)
#   nginx-test-access.log, nginx-test-error.log   isolated nginx -t runs
#
# Per-vhost templates must use:
#   access_log /storage/logs/access-<domain>.log main;
#   error_log  /storage/logs/error-<domain>.log warn;

log_format main 'src="$remote_addr" src_ip="$realip_remote_addr" user="$remote_user" '
	'time_local="$time_local" status="$status" '
	'bytes_out="$bytes_sent" bytes_in="$upstream_bytes_received" '
	'http_referer="$http_referer" http_user_agent="$http_user_agent" '
	'http_x_forwarded_for="$http_x_forwarded_for" '
	'uri_query="$query_string" uri_path="$uri" '
	'http_method="$request_method" response_time="$upstream_response_time" '
	'request_time="$request_time" category="$sent_http_content_type"';

access_log /storage/logs/access.log main;
error_log /storage/logs/error.log warn;
