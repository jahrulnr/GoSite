proxy_temp_path /tmp/proxy_temp_dir;
proxy_cache_path /tmp/proxy_cache_dir levels=1:2 keys_zone=cache_one:20m inactive=1d max_size=5g;
proxy_connect_timeout 60;
# Long read/send timeouts are required for the floating terminal websocket
# (which can stay open for up to 12h of inactivity per GoSite policy).
proxy_read_timeout 86400s;
proxy_send_timeout 86400s;
proxy_buffer_size 32k;
proxy_buffers 4 64k;
proxy_busy_buffers_size 128k;
proxy_temp_file_write_size 128k;
proxy_next_upstream error timeout invalid_header http_500 http_503 http_404;
proxy_cache cache_one;
proxy_hide_header X-Powered-By;
# WebSocket upgrade support for the xterm.js floating terminal.
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
proxy_buffering off;
