server {
	listen 80 default_server;
	listen 443 ssl default_server;
	server_name _;
	ssl_certificate /storage/webconfig/ssl/live/default/cert.pem;
	ssl_certificate_key /storage/webconfig/ssl/live/default/key.pem;

	root /www/default;
	index index.html;

	# Panel API + health → Go service on :8080.
	location /api/ {
		proxy_pass https://127.0.0.1:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_ssl_verify off;
	}
	location = /health {
		proxy_pass https://127.0.0.1:8080/health;
		proxy_ssl_verify off;
	}

	# Default landing page (BangunSite welcome from /www/default).
	location = /favicon.ico {
		log_not_found off;
		access_log off;
		error_log off;
	}
	location = /robot.txt {
		log_not_found off;
		access_log off;
		error_log off;
	}
	location ~* ^/.well-known/ {
		allow all;
		access_log off;
		error_log off;
		log_not_found off;
	}
	location ~ (^|/)\. {
		return 403;
	}
	if ($request_uri ~* "^(.*/)index\.php/(.*)") {
		return 307 $1$2;
	}

	# Panel SPA → Go embed (FE_EMBED=true) at /panel.
	location /panel/ {
		rewrite ^/panel/(.*)$ /$1 break;
		proxy_pass https://127.0.0.1:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_ssl_verify off;
	}
	location = /panel {
		return 301 /panel/;
	}
}
