server {
	listen 80 default_server;
	listen 443 quic reuseport;
	listen 443 ssl;
	listen [::]:443 quic reuseport;
	listen [::]:443 ssl;
	http2 on;
	server_name _;
	ssl_certificate /storage/webconfig/ssl/live/default/cert.pem;
	ssl_certificate_key /storage/webconfig/ssl/live/default/key.pem;

	# HTTP/3 advertisement for website traffic on 80/443 only.
	add_header Alt-Svc 'h3=":__PUBLIC_HTTPS_PORT__"; ma=86400' always;

	root /www/default;
	index index.html;

	location = /favicon.ico {
		log_not_found off;
		access_log off;
		error_log off;
	}
	location = /robot.txt {
		log_not_found off;
		access_log off;
		error_log off;
	}
	location ~* ^/.well-known/ {
		allow all;
		access_log off;
		error_log off;
		log_not_found off;
	}
	location ~ (^|/)\. {
		return 403;
	}
}
