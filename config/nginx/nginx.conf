user apps;
worker_processes auto;
worker_rlimit_nofile 51200;

pcre_jit on;

# Worker-level errors use the same path as config/nginx/custom.d/nginx-log.conf
error_log /storage/logs/error.log warn;

events {
	worker_connections 51200;
	multi_accept on;
	use epoll;
}

http {
	resolver 127.0.0.11;
	resolver_timeout 10s;

	limit_conn_zone $binary_remote_addr zone=perip:10m;
	limit_conn_zone $server_name zone=perserver:10m;

	include /etc/nginx/custom.d/nginx-log.conf;
	include /etc/nginx/custom.d/gzip.conf;
	include /etc/nginx/custom.d/http3.conf;
	include /etc/nginx/custom.d/proxy.conf;
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	client_header_buffer_size 32k;
	client_max_body_size 50m;
	client_body_buffer_size 512k;
	server_tokens off;
	server_names_hash_bucket_size 512;
	large_client_header_buffers 4 32k;

	sendfile on;
	tcp_nopush on;
	keepalive_timeout 60;
	tcp_nodelay on;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers on;
	ssl_session_cache shared:SSL:2m;
	ssl_session_timeout 1h;
	ssl_session_tickets off;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		'' close;
	}

	include /etc/nginx/http.d/*.conf;
	include /storage/webconfig/active.d/*.conf;
}
