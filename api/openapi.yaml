        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /plugins/install:
    post:
      tags: [Plugins]
      summary: Install a plugin artifact
      description: |
        Installs a plugin artifact, parses `manifest.json`, checks host
        compatibility, stores the artifact by digest, and leaves it in
        `installed` state.

        Accepts:
        - multipart field `artifact` (+ optional `sha256`) for air-gapped upload;
        - JSON `content` manifest string for dev/testing;
        - JSON `source` for remote install (wave G) with optional `permissions_ack`
          and `resolveToken` from `POST /plugins/install/resolve`.

        Re-installing the same `(plugin_id, version)` is accepted only when the
        existing registry row is `install_failed`; other duplicate versions
        return `409`.
      operationId: postPluginInstall
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [artifact]
              properties:
                artifact:
                  type: string
                  format: binary
                sha256:
                  type: string
          application/json:
            schema:
              $ref: "#/components/schemas/PluginInstallJSONRequest"
      responses:
        "201":
          description: Plugin installed and ready to enable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /plugins/{vendor}/{name}/enable:
    post:
      tags: [Plugins]
      summary: Enable an installed plugin version
      operationId: postPluginEnable
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PluginVendor"
        - $ref: "#/components/parameters/PluginName"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginVersionRequest"
      responses:
        "200":
          description: Plugin enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /plugins/{vendor}/{name}/disable:
    post:
      tags: [Plugins]
      summary: Disable the enabled plugin version
      operationId: postPluginDisable
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PluginVendor"
        - $ref: "#/components/parameters/PluginName"
      responses:
        "200":
          description: Plugin disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /plugins/{vendor}/{name}/switch:
    post:
      tags: [Plugins]
      summary: Switch the enabled version of a plugin
      operationId: postPluginSwitch
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PluginVendor"
        - $ref: "#/components/parameters/PluginName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginVersionRequest"
      responses:
        "200":
          description: Enabled version switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /plugins/{vendor}/{name}/versions/{version}:
    delete:
      tags: [Plugins]
      summary: Uninstall a stable plugin version
      operationId: deletePluginVersion
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PluginVendor"
        - $ref: "#/components/parameters/PluginName"
        - $ref: "#/components/parameters/PluginVersion"
        - name: purge
          in: query
          schema:
            type: boolean
            default: false
          description: Hard-delete an already-uninstalled registry record.
      responses:
        "200":
          description: Plugin version uninstalled or purged
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PluginResponse"
                  - $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /plugins/{vendor}/{name}/versions/{version}/config:
    get:
      tags: [Plugins]
      summary: Get plugin configuration
      description: |
        Returns the per-version configuration. Secret fields are
        hidden from the response and are only revealed to the plugin
        runtime via internal channels.
      operationId: getPluginConfig
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PluginVendor"
        - $ref: "#/components/parameters/PluginName"
        - $ref: "#/components/parameters/PluginVersion"
      responses:
        "200":
          description: Configuration view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Plugins]
      summary: Persist plugin configuration
      description: |
        Stores non-secret values in the registry and encrypts secret
        fields with AES-256-GCM under PLUGIN_CONFIG_KEY. Replaces
        the existing row for the given (plugin_id, version).
      operationId: putPluginConfig
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PluginVendor"
        - $ref: "#/components/parameters/PluginName"
        - $ref: "#/components/parameters/PluginVersion"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginConfigRequest"
      responses:
        "200":
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginConfigResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /plugins/keyring:
    get:
      tags: [Plugins]
      summary: List trusted vendor signing keys
      operationId: getPluginKeyring
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Trusted keys (revoked entries included)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginKeyringResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Plugins]
      summary: Add or replace a trusted signing key
      operationId: postPluginKeyring
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginKeyringEntry"
      responses:
        "201":
          description: Key registered
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Plugins]
      summary: Revoke a trusted signing key
      operationId: revokePluginKeyring
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - name: vendor
          in: query
          required: true
          schema:
            type: string
        - name: keyId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Key revoked
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: gosite_session
      description: HTTP-only session cookie issued by POST /auth/login
    basicAuth:
      type: http
      scheme: basic
      description: Required on all /api/v1 routes when AUTH_ENABLE=true

  parameters:
    WebsiteId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ContainerId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Docker container ID or name
    CronjobId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    TableName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Whitelisted SQLite table name
    PluginVendor:
      name: vendor
      in: path
      required: true
      schema:
        type: string
      description: Plugin id vendor namespace, e.g. `acme` in `acme/logger`
    PluginName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Plugin id name, e.g. `logger` in `acme/logger`
    PluginVersion:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: Plugin manifest version
    Range:
      name: range
      in: query
      schema:
        type: string
        enum: [1h, 6h, 24h, 1d, 7d]
        default: 1h
      description: Relative time window for metrics

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Authentication required or session expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Operation not permitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    UnprocessableEntity:
      description: Operation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code
              examples:
                - VALIDATION_FAILED
                - AUTH_INVALID_CREDENTIALS
                - SESSION_EXPIRED
                - BASIC_AUTH_REQUIRED
                - NGINX_TEST_FAILED
            message:
              type: string
              description: Human-readable error message

    User:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 1
        remember:
          type: boolean
          default: false

    LoginResponse:
      type: object
      required: [user]
      properties:
        token:
          type: string
          description: Session token (also stored in `gosite_session` cookie)
        user:
          $ref: "#/components/schemas/User"

    AuthMetadata:
      type: object
      required: [lockscreen_enabled, basic_auth_enabled, lock_after_seconds]
      properties:
        lockscreen_enabled:
          type: boolean
          description: Whether UI lockscreen is enabled (ENABLE_LOCKSCREEN)
        basic_auth_enabled:
          type: boolean
          description: Whether HTTP Basic auth gates /api/v1 (AUTH_ENABLE)
        lock_after_seconds:
          type: integer
          minimum: 0
          description: Idle seconds before auto-lock (LOCK_AFTER)

    LockscreenResponse:
      type: object
      required: [locked]
      properties:
        locked:
          type: boolean
        user:
          $ref: "#/components/schemas/User"

    UnlockRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password

    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          description: New password; omit to keep current

    SystemInfo:
      type: object
      properties:
        cpu:
          type: number
          format: double
          description: CPU usage percentage
        memory:
          type: array
          items:
            $ref: "#/components/schemas/MemoryStat"
        storage:
          $ref: "#/components/schemas/StorageStat"

    MemoryStat:
      type: object
      required: [label, total, used, free]
      properties:
        label:
          type: string
        total:
          type: integer
          format: int64
        used:
          type: integer
          format: int64
        free:
          type: integer
          format: int64

    StorageStat:
      type: object
      required: [system, size, used, available]
      properties:
        system:
          type: string
        size:
          type: integer
          format: int64
        used:
          type: integer
          format: int64
        available:
          type: integer
          format: int64

    NetworkTraffic:
      type: object
      properties:
        in:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: Per-interface inbound byte counters
        out:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: Per-interface outbound byte counters

    DiskIO:
      type: object
      properties:
        read:
          type: string
        write:
          type: string

    TrafficSite:
      type: object
      required: [requests, bytes]
      properties:
        requests:
          type: integer
          format: int64
        bytes:
          type: integer
          format: int64

    TrafficSummary:
      type: object
      required: [sites, total]
      properties:
        sites:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/TrafficSite"
        total:
          $ref: "#/components/schemas/TrafficSite"

    DashboardResponse:
      type: object
      required: [system, traffic_summary, ssl_expiring, recent_audit]
      properties:
        system:
          $ref: "#/components/schemas/SystemInfo"
        traffic_summary:
          oneOf:
            - $ref: "#/components/schemas/TrafficSummary"
            - $ref: "#/components/schemas/TrafficMetricsSummary"
        ssl_expiring:
          type: array
          items:
            $ref: "#/components/schemas/ExpiringCert"
        recent_audit:
          type: array
          items:
            $ref: "#/components/schemas/QueryEvent"

    ExpiringCert:
      type: object
      required: [website_id, domain, expires_at, days_left, expired]
      properties:
        website_id:
          type: integer
          format: int64
        domain:
          type: string
        expires_at:
          type: string
          format: date-time
        days_left:
          type: integer
        expired:
          type: boolean

    QueryEvent:
      type: object
      required: [ts, source, action, user, message, meta]
      properties:
        ts:
          type: string
          format: date-time
        source:
          type: string
        action:
          type: string
        user:
          type: string
        message:
          type: string
        meta:
          type: object
          additionalProperties: true

    LogSite:
      type: object
      required: [domain]
      properties:
        domain:
          type: string
        name:
          type: string

    LogTailResponse:
      type: object
      required: [domain, type, path, lines]
      properties:
        domain:
          type: string
        type:
          type: string
          enum: [access, error]
        path:
          type: string
        lines:
          type: array
          items:
            type: string
        line_count:
          type: integer
        content:
          type: string
          description: Legacy combined content; prefer `lines`

    LogLinesResponse:
      type: object
      required: [lines]
      properties:
        lines:
          type: array
          items:
            type: string

    DatabaseTablesResponse:
      type: object
      required: [path, tables]
      properties:
        path:
          type: string
        tables:
          type: array
          items:
            type: string

    DatabaseTableData:
      type: object
      required: [name, columns, rows, limit, offset, count]
      properties:
        name:
          type: string
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items: {}
        limit:
          type: integer
        offset:
          type: integer
        count:
          type: integer

    Website:
      type: object
      required: [id, name, domain, path, type, ssl, active]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        domain:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [static, proxy]
        upstream:
          type: string
        ssl:
          type: boolean
        active:
          type: boolean
        config:
          type: string

    WebsiteCreateRequest:
      type: object
      required: [name, domain, path, type]
      properties:
        name:
          type: string
        domain:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [static, proxy]
        upstream:
          type: string
        active:
          type: boolean
          default: false

    WebsiteUpdateRequest:
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [static, proxy]
        upstream:
          type: string
        active:
          type: boolean

    WebsiteValidateRequest:
      type: object
      required: [domain, path]
      properties:
        name:
          type: string
        domain:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [static, proxy]
        upstream:
          type: string
        active:
          type: boolean
        id:
          type: integer
          format: int64
          description: Existing website ID to exclude from duplicate checks

    WebsiteValidateResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        reason:
          type: string

    WebsiteToggleResponse:
      type: object
      required: [id, active, message]
      properties:
        id:
          type: integer
          format: int64
        active:
          type: boolean
        message:
          type: string

    SslStatus:
      type: object
      required: [enabled, expired]
      properties:
        enabled:
          type: boolean
        cert_path:
          type: string
        key_path:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        expired:
          type: boolean
        public_pem:
          type: string
        private_pem:
          type: string

    SslManualUpdateRequest:
      type: object
      required: [public, private]
      properties:
        public:
          type: string
          description: PEM-encoded certificate chain
        private:
          type: string
          description: PEM-encoded private key

    NginxConfigResponse:
      type: object
      required: [config]
      properties:
        config:
          type: string

    NginxConfigUpdateRequest:
      type: object
      required: [config]
      properties:
        config:
          type: string

    NginxGlobalUpdateRequest:
      type: object
      properties:
        content:
          type: string
          description: Preferred field for global nginx.conf body
        config:
          type: string
          description: Alias accepted for backward compatibility

    NginxTestResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    DockerContainer:
      type: object
      required: [id, name, image, status]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        status:
          type: string
        state:
          type: string
        created:
          type: string

    FileEntry:
      type: object
      required: [name, path, size, mode, is_dir, mod_time, kind, mime_type, extension, editable, viewable, archive, symlink]
      properties:
        name:
          type: string
        path:
          type: string
        size:
          type: integer
          format: int64
        mode:
          type: string
        is_dir:
          type: boolean
        mod_time:
          type: string
        kind:
          type: string
          enum: [directory, image, json, yaml, config, text, archive, binary]
        mime_type:
          type: string
        extension:
          type: string
        editable:
          type: boolean
        viewable:
          type: boolean
        archive:
          type: boolean
        symlink:
          type: boolean
        target:
          type: string

    FileArchiveTools:
      type: object
      required: [unzip, tar, gzip]
      properties:
        unzip:
          type: boolean
        tar:
          type: boolean
        gzip:
          type: boolean

    FileListResponse:
      type: object
      required: [entries, tools]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FileEntry"
        tools:
          $ref: "#/components/schemas/FileArchiveTools"

    FileContentResponse:
      type: object
      required: [content, entry, encoding]
      properties:
        content:
          type: string
        entry:
          $ref: "#/components/schemas/FileEntry"
        encoding:
          type: string

    FileSaveRequest:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
        content:
          type: string

    FileBatchSaveRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileSaveRequest"

    FileBatchDeleteRequest:
      type: object
      required: [paths]
      properties:
        paths:
          type: array
          items:
            type: string

    FileCreateRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [directory, file, remote]
        name:
          type: string
        path:
          type: string
        content:
          type: string

    FileActionRequest:
      type: object
      required: [action, path]
      properties:
        action:
          type: string
          enum: [chmod, copy, move, rename, extract, uncompress, execute]
        path:
          type: string
        mode:
          type: string
          description: Octal mode for chmod
        to_path:
          type: string
          description: Destination path for copy

    Mount:
      type: object
      required: [device, dir, type, options, dump, fsck, mounted]
      properties:
        device:
          type: string
        dir:
          type: string
        type:
          type: string
        options:
          type: string
        dump:
          type: string
        fsck:
          type: string
        mounted:
          type: boolean

    MountCreateRequest:
      type: object
      required: [device, dir, type]
      properties:
        device:
          type: string
        dir:
          type: string
        type:
          type: string
        options:
          type: string
          default: defaults
        dump:
          type: string
          default: "0"
        fsck:
          type: string
          default: "0"

    MountUpdateRequest:
      type: object
      required: [old_device, old_dir, entry]
      properties:
        old_device:
          type: string
        old_dir:
          type: string
        entry:
          $ref: "#/components/schemas/MountCreateRequest"

    MountEnableRequest:
      type: object
      required: [device, dir]
      properties:
        device:
          type: string
        dir:
          type: string

    Cronjob:
      type: object
      required: [id, name, payload, run_every]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        payload:
          type: string
        run_every:
          type: string
          enum: [min, hour, day, month]
        executed_at:
          type: string
          format: date-time
          nullable: true

    CronjobCreateRequest:
      type: object
      required: [name, payload, run_every]
      properties:
        name:
          type: string
        payload:
          type: string
        run_every:
          type: string
          enum: [min, hour, day, month]

    CronjobUpdateRequest:
      type: object
      properties:
        name:
          type: string
        payload:
          type: string
        run_every:
          type: string
          enum: [min, hour, day, month]

    JobAcceptedResponse:
      type: object
      required: [job_id, message]
      properties:
        job_id:
          type: integer
          format: int64
        message:
          type: string

    UiMetaResponse:
      type: object
      additionalProperties: true
      description: Backend-owned UI options and feature capabilities.

    QueryMetaResponse:
      type: object
      required: [syntax_hint, time_ranges, sources]
      properties:
        syntax_hint:
          type: string
        time_ranges:
          type: array
          items:
            type: object
            additionalProperties: true
        sources:
          type: array
          items:
            $ref: "#/components/schemas/QuerySourceMeta"

    QuerySourceMeta:
      type: object
      required: [id, label, group, description, query, fields, quick_filters, examples]
      properties:
        id:
          type: string
          example: access-example.com
        label:
          type: string
          example: access-example.com.log
        group:
          type: string
          enum: [nginx, system]
        description:
          type: string
        log_path:
          type: string
        query:
          type: object
          required: [source]
          properties:
            source:
              type: string
              enum: [audit, job, access, error, all]
            site:
              type: string
        fields:
          type: array
          items:
            type: object
            additionalProperties: true
        quick_filters:
          type: array
          items:
            type: object
            additionalProperties: true
        examples:
          type: array
          items:
            type: string

    QueryRequest:
      type: object
      required: [source, q]
      properties:
        source:
          type: string
          enum: [audit, job, access, error, all]
        site:
          type: string
          description: Optional nginx site/domain scope supplied by query metadata.
        q:
          type: string
          description: |
            Mini Splunk query. Supports `field:value` tokens, plain bareword
            search, `*` wildcards, and Go-regexp wrapped in `/.../`. Examples:
            `login`, `action:website.*`, `status_code:5\d\d`, `action:/^login.*/`,
            or bareword `/timeout|500/`. Space means AND.
        from:
          type: string
          format: date-time
          nullable: true
        to:
          type: string
          format: date-time
          nullable: true
        limit:
          type: integer
          minimum: 1
          default: 100
        offset:
          type: integer
          minimum: 0
          default: 0
        mode:
          type: string
          enum: [history, live]
          description: |
            Informational hint for client UIs that toggle between History
            (POST /query) and Live Tail (GET /query/tail). The SQL layer
            ignores this field.

    QueryResponse:
      type: object
      required: [hits, events]
      properties:
        hits:
          type: integer
        events:
          type: array
          items:
            $ref: "#/components/schemas/QueryEvent"

    QueryStreamFrame:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [ingesting, meta, event, done, error]
        hits:
          type: integer
        event:
          $ref: "#/components/schemas/QueryEvent"
        error:
          $ref: "#/components/schemas/ApiError"

    SavedQuery:
      type: object
      required: [id, name, source, query, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        source:
          type: string
          enum: [audit, job, access, error, all]
        query:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SavedQueryCreateRequest:
      type: object
      required: [name, source, q]
      properties:
        name:
          type: string
        source:
          type: string
          enum: [audit, job, access, error, all]
        q:
          type: string
          description: Query text to persist

    SavedQueryUpdateRequest:
      type: object
      description: |
        All fields are optional; omitted (or empty) values keep the existing
        stored value. Pass `q` to update the query text; it is validated via
        the same parser used by `POST /query`.
      properties:
        name:
          type: string
        source:
          type: string
          enum: [audit, job, access, error, all]
        q:
          type: string

    QueryTailResponse:
      type: object
      description: |
        Documentation shape for an SSE `/query/tail` stream. Each
        `data: <json>` line in the response carries one `QueryEvent` from
        this envelope. The envelope also accepts an `event: error` SSE event
        whose `data` is an `ApiError` envelope.
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/QueryEvent"

    TrafficSeriesResponse:
      type: object
      required: [step, requests, bytes]
      properties:
        step:
          type: string
          description: Bucket step (e.g. 5m)
        requests:
          type: object
          additionalProperties:
            type: array
            items:
              type: array
              prefixItems:
                - type: string
                  format: date-time
                - type: integer
              minItems: 2
              maxItems: 2
        bytes:
          type: object
          additionalProperties:
            type: array
            items:
              type: array
              prefixItems:
                - type: string
                  format: date-time
                - type: integer
              minItems: 2
              maxItems: 2

    TopSiteEntry:
      type: object
      required: [site, requests, bytes]
      properties:
        site:
          type: string
        requests:
          type: integer
        bytes:
          type: integer

    StatusCodesResponse:
      type: object
      required: [s2xx, s3xx, s4xx, s5xx]
      properties:
        s2xx:
          type: integer
        s3xx:
          type: integer
        s4xx:
          type: integer
        s5xx:
          type: integer

    TrafficMetricsSummary:
      type: object
      required: [range, requests, bytes]
      properties:
        range:
          type: string
        requests:
          type: integer
        bytes:
          type: integer

    PluginVersion:
      type: object
      required:
        - id
        - plugin_id
        - version
        - name
        - tier
        - api_version
        - artifact_digest
        - state
        - manifest
        - capabilities
        - ui
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        plugin_id:
          type: string
          description: Namespaced plugin id, e.g. `acme/logger`
        version:
          type: string
        name:
          type: string
        tier:
          type: integer
          enum: [0, 1]
        api_version:
          type: string
          example: gosite-plugin/1
        min_gosite_version:
          type: string
        rpc_version:
          type: string
        config_version:
          type: string
        artifact_digest:
          type: string
        state:
          type: string
          enum:
            - installing
            - installed
            - install_failed
            - enabling
            - enabled
            - enable_failed
            - disabling
            - uninstalling
            - uninstalled
        failure_class:
          type: string
          enum:
            - validate_timeout
            - start_failed
            - hook_refresh_failed
            - db_failed
            - compensation_failed
            - stop_failed
            - fs_delete_failed
            - config_migration_failed
            - unknown
            - ""
        failure_message:
          type: string
        failure_at:
          type: string
          format: date-time
          nullable: true
        manifest:
          type: object
          additionalProperties: true
          description: Immutable manifest snapshot parsed during install.
        capabilities:
          type: object
          additionalProperties: true
          description: Declared host capabilities from the manifest.
        ui:
          type: object
          additionalProperties: true
          description: Data-only UI contribution definitions rendered by the host.
        source_type:
          type: string
          description: Remote install resolver type (e.g. url, github-release).
        source_ref:
          type: string
          description: Human-readable source reference (URL, repo@tag, …).
        resolved_url:
          type: string
          description: Final artifact download URL when applicable.
        install_path:
          type: string
          enum: [release, build]
        source_commit:
          type: string
          description: Optional VCS commit SHA linked to the artifact.
        permissions_ack_at:
          type: string
          format: date-time
          nullable: true
        install_log:
          type: array
          items:
            $ref: "#/components/schemas/PluginInstallLogStep"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PluginResponse:
      type: object
      required: [plugin]
      properties:
        plugin:
          $ref: "#/components/schemas/PluginVersion"

    PluginListResponse:
      type: object
      required: [plugins]
      properties:
        plugins:
          type: array
          items:
            $ref: "#/components/schemas/PluginVersion"

    PluginInstallJSONRequest:
      type: object
      description: Manifest-only dev install or remote install via source.
      properties:
        name:
          type: string
        sha256:
          type: string
        content:
          type: string
          description: Manifest JSON string for development/testing clients.
        source:
          $ref: "#/components/schemas/PluginSource"
        permissions_ack:
          type: boolean
          description: Acknowledge declared capabilities before remote install.
        resolveToken:
          type: string
          description: Token from POST /plugins/install/resolve preview.

    PluginSource:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum:
            - url
            - github-release
            - github
            - github-build
            - gitlab-release
            - gitlab
            - gitlab-build
            - git-ref
        url:
          type: string
          format: uri
        repo:
          type: string
          description: owner/repo or GitLab path with namespace
        tag:
          type: string
        asset:
          type: string
          description: Optional release asset name override
        sha256:
          type: string
          description: Required for type=url
        installPath:
          type: string
          enum: [release, build]
        resolveToken:
          type: string

    PluginResolveRequest:
      type: object
      required: [source]
      properties:
        source:
          $ref: "#/components/schemas/PluginSource"

    PluginResolvePreview:
      type: object
      properties:
        plugin_id:
          type: string
        version:
          type: string
        tier:
          type: integer
        signed:
          type: boolean
        keyId:
          type: string
        sha256:
          type: string
        size:
          type: integer
          format: int64
        url:
          type: string
          format: uri
        minGoSiteVersion:
          type: string
        source_type:
          type: string
        source_ref:
          type: string
        install_path:
          type: string
        sourceCommit:
          type: string
        sourceRepository:
          type: string
        permissions:
          type: array
          items:
            type: string
        hooks:
          type: array
          items:
            type: string
        supportedPlatforms:
          type: array
          items:
            $ref: "#/components/schemas/PluginPlatform"
        resolveToken:
          type: string
        resolveExpiresAt:
          type: string
          format: date-time

    PluginResolvePreviewResponse:
      type: object
      required: [preview]
      properties:
        preview:
          $ref: "#/components/schemas/PluginResolvePreview"

    PluginPlatform:
      type: object
      properties:
        os:
          type: string
        arch:
          type: string

    PluginInstallSettings:
      type: object
      properties:
        remote_install_enabled:
          type: boolean
        trust_mode:
          type: string
        allowed_hosts:
          type: array
          items:
            type: string
        allow_unsigned:
          type: boolean
        github_token_configured:
          type: boolean
        gitlab_token_configured:
          type: boolean
        build_enabled:
          type: boolean

    PluginCatalogEntry:
      type: object
      properties:
        plugin_id:
          type: string
        name:
          type: string
        description:
          type: string
        vendor:
          type: string
        source:
          $ref: "#/components/schemas/PluginSource"

    PluginCatalogListResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PluginCatalogEntry"

    PluginCatalogEntryResponse:
      type: object
      required: [entry]
      properties:
        entry:
          $ref: "#/components/schemas/PluginCatalogEntry"

    PluginInstallLogStep:
      type: object
      properties:
        step:
          type: string
        at:
          type: string
          format: date-time
        status:
          type: string
        failure_class:
          type: string
        detail:
          type: string

    PluginVersionRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string

    PluginConfigRequest:
      type: object
      required: [version, values]
      properties:
        version:
          type: string
        configVersion:
          type: string
        values:
          type: object
          additionalProperties: true
        secrets:
          type: object
          additionalProperties: true
          description: |
            Map of secret field name to plaintext value. Encrypted with
            AES-256-GCM under PLUGIN_CONFIG_KEY at rest, and never
            included in API responses.

    PluginConfigResponse:
      type: object
      properties:
        plugin_id:
          type: string
        version:
          type: string
        config_version:
          type: string
        values:
          type: object
          additionalProperties: true
        updated_at:
          type: string
          format: date-time

    PluginKeyringEntry:
      type: object
      required: [vendor, keyId, publicKey]
      properties:
        vendor:
          type: string
        keyId:
          type: string
        publicKey:
          type: string
          description: base64-encoded ed25519 public key
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time

    PluginKeyringResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/PluginKeyringEntry"

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
