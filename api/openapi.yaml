        - name: site
          in: query
          schema:
            type: string
          description: Optional nginx site/domain scope for access/error sources.
      responses:
        "200":
          description: SSE stream of QueryEvent frames
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/QueryTailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

