      summary: Live tail of query events
      description: |
        Server-Sent Events stream of `QueryEvent` objects. The connection stays
        open and emits new audit, job, access, and error events as they are
        ingested. Use `event: error` SSE events to observe errors and `: keepalive`
        comments as heartbeats.
      operationId: getQueryTail
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - name: source
          in: query
          schema:
            type: string
            enum: [audit, job, access, error, all]
