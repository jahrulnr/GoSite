openapi: 3.1.0
info:
  title: GoSite Panel API
  version: 1.0.0
  description: |
    REST API for the GoSite hosting control panel.

    Authentication uses an HTTP-only session cookie (`gosite_session`) issued by
    `POST /auth/login`. When `AUTH_ENABLE=true`, all `/api/v1/*` routes also
    require HTTP Basic authentication before session checks.

    Errors use a consistent envelope: `{ "error": { "code": "...", "message": "..." } }`.
servers:
  - url: https://localhost:8080/api/v1
    description: Panel API (v1)
  - url: https://localhost:8080
    description: Root (health check only)

tags:
  - name: Health
  - name: Auth
  - name: Dashboard
  - name: System
  - name: Settings
  - name: Logs
  - name: Database
  - name: Websites
  - name: SSL
  - name: Nginx
  - name: Docker
  - name: Files
  - name: Mounts
  - name: Cronjobs
  - name: Plugins
  - name: Observability
  - name: Metrics

paths:
  /health:
    servers:
      - url: https://localhost:8080
    get:
      tags: [Health]
      summary: Liveness check
      description: Service readiness probe. Does not require authentication.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [ok]
                    example: ok

  /auth/login:
    get:
      tags: [Auth]
      summary: Auth metadata
      description: |
        Returns panel authentication configuration for the login and lockscreen UI.
        Available before session login when HTTP Basic auth (if enabled) succeeds.
      operationId: getAuthLoginMetadata
      security:
        - basicAuth: []
      responses:
        "200":
          description: Auth metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMetadata"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Auth]
      summary: Login
      description: |
        Authenticates a user and issues a `gosite_session` HTTP-only cookie plus a
        session token in the response body.
      operationId: postAuthLogin
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: HTTP-only session cookie (`gosite_session`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Destroys the current session and clears the session cookie.
      operationId: postAuthLogout
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      summary: Current user
      operationId: getAuthMe
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/lockscreen:
    get:
      tags: [Auth]
      summary: Lockscreen state
      description: Returns lockscreen context for the current (locked) session user.
      operationId: getAuthLockscreen
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Lockscreen state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockscreenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/lock:
    post:
      tags: [Auth]
      summary: Lock session
      description: Locks the panel UI while preserving the session for unlock.
      operationId: postAuthLock
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "204":
          description: Session locked
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/unlock:
    post:
      tags: [Auth]
      summary: Unlock session
      description: Re-authenticates the locked session user with their password.
      operationId: postAuthUnlock
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockRequest"
      responses:
        "200":
          description: Session unlocked
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Dashboard snapshot
      operationId: getDashboard
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Aggregated dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /system/info:
    get:
      tags: [System]
      summary: Host system info
      operationId: getSystemInfo
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: CPU, memory, and storage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /system/network:
    get:
      tags: [System]
      summary: Network traffic counters
      operationId: getSystemNetwork
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Per-interface RX/TX byte counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkTraffic"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /system/disk-io:
    get:
      tags: [System]
      summary: Disk I/O snapshot
      operationId: getSystemDiskIO
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Disk read/write counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskIO"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /system/nginx-traffic:
    get:
      tags: [System]
      summary: Nginx access-log traffic rollup
      operationId: getSystemNginxTraffic
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Per-site and total nginx traffic from access logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /settings/profile:
    put:
      tags: [Settings]
      summary: Update profile
      operationId: putSettingsProfile
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /logs/sites:
    get:
      tags: [Logs]
      summary: List log sites
      operationId: getLogsSites
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Selectable domains for log tailing
          content:
            application/json:
              schema:
                type: object
                required: [sites]
                properties:
                  sites:
                    type: array
                    items:
                      $ref: "#/components/schemas/LogSite"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /logs:
    get:
      tags: [Logs]
      summary: Tail nginx logs
      operationId: getLogsTail
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
          description: Site domain or `default`
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [access, error]
        - name: tail
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1000
          description: Number of trailing lines to return
      responses:
        "200":
          description: Log tail content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogTailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /database/tables:
    get:
      tags: [Database]
      summary: List database tables
      operationId: getDatabaseTables
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Whitelisted SQLite tables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseTablesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /database/tables/{name}:
    get:
      tags: [Database]
      summary: Browse table rows
      operationId: getDatabaseTable
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/TableName"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Table page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseTableData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /websites:
    get:
      tags: [Websites]
      summary: List websites
      operationId: listWebsites
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: All websites
          content:
            application/json:
              schema:
                type: object
                required: [websites]
                properties:
                  websites:
                    type: array
                    items:
                      $ref: "#/components/schemas/Website"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Websites]
      summary: Create website
      operationId: createWebsite
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteCreateRequest"
      responses:
        "201":
          description: Website created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /websites/validate:
    post:
      tags: [Websites]
      summary: Validate domain and path
      operationId: validateWebsite
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteValidateRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsiteValidateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /websites/{id}:
    get:
      tags: [Websites]
      summary: Get website
      operationId: getWebsite
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
      responses:
        "200":
          description: Website details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Websites]
      summary: Update website
      operationId: updateWebsite
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebsiteUpdateRequest"
      responses:
        "200":
          description: Website updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Website"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Websites]
      summary: Delete website
      operationId: deleteWebsite
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
        - name: clean
          in: query
          schema:
            type: boolean
            default: false
          description: Remove filesystem artifacts when true
      responses:
        "200":
          description: Website deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /websites/{id}/toggle:
    patch:
      tags: [Websites]
      summary: Toggle website active state
      operationId: toggleWebsite
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
      responses:
        "200":
          description: Website toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebsiteToggleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /websites/{id}/nginx-config:
    get:
      tags: [Websites]
      summary: Get site nginx config
      operationId: getWebsiteNginxConfig
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
      responses:
        "200":
          description: Site-specific nginx configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NginxConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Websites]
      summary: Update site nginx config
      operationId: putWebsiteNginxConfig
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NginxConfigUpdateRequest"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /websites/{id}/ssl:
    get:
      tags: [SSL]
      summary: SSL status
      operationId: getWebsiteSslStatus
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
      responses:
        "200":
          description: SSL certificate status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SslStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /websites/{id}/ssl/manual:
    put:
      tags: [SSL]
      summary: Upload manual SSL certificate
      operationId: putWebsiteSslManual
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SslManualUpdateRequest"
      responses:
        "200":
          description: SSL updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /websites/{id}/ssl/certbot:
    post:
      tags: [SSL]
      summary: Start certbot job
      operationId: postWebsiteSslCertbot
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
      responses:
        "202":
          description: Certbot job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /websites/{id}/ssl/certbot/stream:
    get:
      tags: [SSL]
      summary: Certbot job output stream
      description: Server-Sent Events stream of certbot job output and status updates.
      operationId: getWebsiteSslCertbotStream
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/WebsiteId"
        - name: job_id
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Newline-delimited SSE `data:` frames containing certbot output lines
                  and `status=<pending|running|done|failed>` updates.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /nginx/default:
    get:
      tags: [Nginx]
      summary: Get default nginx config
      operationId: getNginxDefault
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: default.conf content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NginxConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Nginx]
      summary: Update default nginx config
      operationId: putNginxDefault
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NginxConfigUpdateRequest"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /nginx/global:
    get:
      tags: [Nginx]
      summary: Get global nginx config
      operationId: getNginxGlobal
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Global nginx.conf content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NginxConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Nginx]
      summary: Update global nginx config
      operationId: putNginxGlobal
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NginxGlobalUpdateRequest"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /nginx/test:
    post:
      tags: [Nginx]
      summary: Test nginx configuration
      operationId: postNginxTest
      security:
        - basicAuth: []
          sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NginxConfigUpdateRequest"
      responses:
        "200":
          description: Configuration is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NginxTestResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /nginx/reload:
    post:
      tags: [Nginx]
      summary: Reload nginx
      operationId: postNginxReload
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Nginx reloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /docker/containers:
    get:
      tags: [Docker]
      summary: List containers
      operationId: listDockerContainers
      security:
        - basicAuth: []
          sessionCookie: []
      responses:
        "200":
          description: Docker containers
          content:
            application/json:
              schema:
                type: object
                required: [containers]
                properties:
                  containers:
                    type: array
                    items:
                      $ref: "#/components/schemas/DockerContainer"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /docker/containers/{id}/restart:
    post:
      tags: [Docker]
      summary: Restart container
      operationId: restartDockerContainer
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/ContainerId"
      responses:
        "200":
          description: Container restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /docker/containers/{id}/stop:
    post:
      tags: [Docker]
      summary: Stop container
      operationId: stopDockerContainer
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/ContainerId"
      responses:
        "200":
          description: Container stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /docker/containers/{id}/logs:
    get:
      tags: [Docker]
      summary: Container logs
      operationId: getDockerContainerLogs
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/ContainerId"
        - name: tail
          in: query
          schema:
            type: integer
            minimum: 1
            default: 200
      responses:
        "200":
          description: Recent log lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogLinesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /files:
    get:
      tags: [Files]
      summary: Browse directory
      operationId: browseFiles
      security:
        - basicAuth: []
          sessionCookie: []
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute path; the file manager can browse from filesystem root when permitted by the host process.
      responses:
        "200":
          description: Directory listing
