name: E2E Tests

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/e2e-test.yml"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "plugins/**"
      - "web/**"
      - "config/**"
      - "migrations/**"
      - "Makefile"
  pull_request:
    paths:
      - ".github/workflows/e2e-test.yml"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "plugins/**"
      - "web/**"
      - "config/**"
      - "migrations/**"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.repository }}-${{ github.event_name == 'push' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build bundled plugins
        run: make bundled-plugins

      - name: Bootstrap dev storage
        run: bash scripts/dev-api-setup.sh

      - name: Start gosite dev API
        run: |
          APP_ENV=local DEMO_SEED=true \
          STORAGE_PATH=/tmp/gosite-qa/storage \
          DB_DATABASE=/tmp/gosite-qa/storage/db.sqlite \
          WEB_PATH=/tmp/gosite-qa/storage/www \
          TEMPLATES_DIR=$GITHUB_WORKSPACE/config \
          ETC_DIR=/tmp/gosite-qa/etc \
          LETSENCRYPT_DIR=/tmp/gosite-qa/etc/letsencrypt \
          PLUGIN_BUNDLED_PATH=$GITHUB_WORKSPACE/dist/bundled-plugins \
          AUTH_ENABLE=false SESSION_COOKIE_SECURE=false FE_EMBED=true \
          TLS_ENABLE=false \
          LISTEN_ADDR=:8080 \
          go run ./cmd/gosite serve &
          echo $! > /tmp/gosite.pid

      - name: Wait for gosite to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "gosite is ready"
              exit 0
            fi
            sleep 2
          done
          echo "gosite did not start in time"
          cat /tmp/gosite-qa/storage/logs/bootstrap.log 2>/dev/null || true
          exit 1

      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=github
        working-directory: web
        env:
          GOSITE_URL: http://localhost:8080

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            web/test-results/
            web/playwright-report/
          retention-days: 7

      - name: Stop gosite
        if: always()
        run: |
          if [ -f /tmp/gosite.pid ]; then
            kill "$(cat /tmp/gosite.pid)" 2>/dev/null || true
          fi
