name: Docker Build

on:
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/docker-build.yml'
      - 'Dockerfile'
      - 'docker/**'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'plugins/**'
      - 'web/**'
      - 'config/**'
      - 'migrations/**'
      - 'Makefile'
  pull_request:
    paths:
      - '.github/workflows/docker-build.yml'
      - 'Dockerfile'
      - 'docker/**'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'plugins/**'
      - 'web/**'
      - 'config/**'
      - 'migrations/**'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.repository }}-${{ github.event_name == 'push' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: gosite:ci
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker image inspect gosite:ci --format '{{.Id}}' >/dev/null
          docker run --rm --entrypoint gosite gosite:ci help
