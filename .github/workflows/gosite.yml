name: GoSite CI

on:
  pull_request:
    paths:
      - '.github/workflows/gosite.yml'
      - 'go.mod'
      - 'go.sum'
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'plugins/**'
      - 'web/**'
      - 'config/**'
      - 'migrations/**'
      - 'Makefile'
      - 'Dockerfile'
      - 'docker/**'
      - 'docs/**'
      - 'scripts/export-wiki.sh'
      - 'scripts/push-wiki.sh'
      - 'scripts/dev-api-setup.sh'
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump level (patch | minor | major)"
        required: true
        default: "patch"

permissions:
  contents: read

concurrency:
  group: gosite-${{ github.repository }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # -- Parallel: test --
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -count=1 ./...
      - run: make contract-check
      - run: make -C plugins/gosite/mcp vet

  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: make bundled-plugins
      - run: bash scripts/dev-api-setup.sh
      - name: Start gosite dev API
        run: |
          APP_ENV=local DEMO_SEED=true \
          STORAGE_PATH=/tmp/gosite-qa/storage \
          DB_DATABASE=/tmp/gosite-qa/storage/db.sqlite \
          WEB_PATH=/tmp/gosite-qa/storage/www \
          TEMPLATES_DIR=$GITHUB_WORKSPACE/config \
          ETC_DIR=/tmp/gosite-qa/etc \
          LETSENCRYPT_DIR=/tmp/gosite-qa/etc/letsencrypt \
          PLUGIN_BUNDLED_PATH=$GITHUB_WORKSPACE/dist/bundled-plugins \
          AUTH_ENABLE=false SESSION_COOKIE_SECURE=false FE_EMBED=true \
          TLS_ENABLE=false \
          LISTEN_ADDR=:8080 \
          go run ./cmd/gosite serve &
          echo $! > /tmp/gosite.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "gosite is ready"
              exit 0
            fi
            sleep 2
          done
          echo "gosite did not start in time"
          cat /tmp/gosite-qa/storage/logs/bootstrap.log 2>/dev/null || true
          exit 1
      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=github
        working-directory: web
        env:
          GOSITE_URL: http://localhost:8080
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-results
          path: |
            web/test-results/
            web/playwright-report/
          retention-days: 7
      - name: Stop gosite
        if: always()
        run: |
          if [ -f /tmp/gosite.pid ]; then
            kill "$(cat /tmp/gosite.pid)" 2>/dev/null || true
          fi

  # -- Serial: build image only if tests and wiki validation pass --
  docker-build:
    needs: [go-test, web-test, e2e-test, wiki-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: gosite:ci
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify image
        run: |
          docker image inspect gosite:ci --format '{{.Id}}' >/dev/null
          docker run --rm --entrypoint gosite gosite:ci help

  # -- Wiki export validation (runs on all triggers) --
  wiki-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Export wiki markdown
        run: make wiki-export
        env:
          GOSITE_REPO: ${{ github.repository }}
          GOSITE_BRANCH: ${{ github.ref_name }}

      - name: Validate wiki export
        run: |
          set -euo pipefail
          test -f docs/wiki-export/Home.md
          test -f docs/wiki-export/Home-id.md
          test -f docs/wiki-export/_Sidebar.md
          count="$(find docs/wiki-export -maxdepth 1 -name '*.md' | wc -l)"
          echo "Exported ${count} markdown files"
          test "${count}" -ge 20

  # -- Parallel: tag release and publish wiki after build succeeds --
  tag:
    needs: [docker-build]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      created: ${{ steps.create_tag.outputs.created }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine bump level
        id: bump_level
        env:
          MANUAL_BUMP: ${{ github.event.inputs.bump }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$MANUAL_BUMP" ]; then
            echo "level=$MANUAL_BUMP" >> "$GITHUB_OUTPUT"
            echo "source=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_msg="$(git log -1 --pretty=%B)"
          pr_num="$(echo "$commit_msg" | grep -oP 'Merge pull request #\K[0-9]+' || true)"

          if [ -n "$pr_num" ]; then
            labels="$(gh pr view "$pr_num" --json labels --jq '.labels[].name' 2>/dev/null || echo '')"
            echo "PR #$pr_num labels: $labels"
            if echo "$labels" | grep -qi 'breaking\|major'; then
              echo "level=major" >> "$GITHUB_OUTPUT"
            elif echo "$labels" | grep -qi 'feature\|minor\|enhancement'; then
              echo "level=minor" >> "$GITHUB_OUTPUT"
            else
              echo "level=patch" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi
          echo "source=labels" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        env:
          LEVEL: ${{ steps.bump_level.outputs.level }}
        run: |
          latest_tag="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "v1.0.0")"
          version="${latest_tag#v}"
          echo "Latest tag: $latest_tag → version: $version"

          IFS='.' read -r major minor patch <<< "$version"

          case "$LEVEL" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Bump level: $LEVEL → new tag: $new_tag"

      - name: Create tag
        id: create_tag
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists — skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          commit_msg="$(git log -1 --pretty=%B)"
          pr_num="$(echo "$commit_msg" | grep -oP 'Merge pull request #\K[0-9]+' || true)"
          pr_title=""

          if [ -n "$pr_num" ]; then
            pr_title="$(gh pr view "$pr_num" --json title --jq '.title' 2>/dev/null || echo '')"
          fi

          tag_msg="Release $NEW_TAG"
          if [ -n "$pr_num" ]; then
            tag_msg="$(printf '%s\n\nMerged PR #%s: %s' "$tag_msg" "$pr_num" "$pr_title")"
          fi

          git tag -a "$NEW_TAG" -m "$tag_msg"
          git push origin "$NEW_TAG"

          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Created and pushed $NEW_TAG"

      - name: Create GitHub Release
        if: steps.create_tag.outputs.created == 'true'
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          commit_msg="$(git log -1 --pretty=%B)"
          pr_num="$(echo "$commit_msg" | grep -oP 'Merge pull request #\K[0-9]+' || true)"
          pr_url=""
          pr_title=""

          if [ -n "$pr_num" ]; then
            pr_url="$(gh pr view "$pr_num" --json url --jq '.url' 2>/dev/null || echo '')"
            pr_title="$(gh pr view "$pr_num" --json title --jq '.title' 2>/dev/null || echo '')"
          fi

          if [ -n "$pr_num" ]; then
            changes="Merged PR #$pr_num: $pr_title"
            link="[View PR]($pr_url)"
          else
            changes="Manual release"
            link=""
          fi

          notes="$(printf '## Release %s\n\n### Changes\n%s\n\n%s\n\n### Commits\n%s' \
            "$NEW_TAG" \
            "$changes" \
            "$link" \
            "$(git log --oneline --pretty=format:'- %h %s' HEAD~10..HEAD 2>/dev/null || echo '- (see git log)')")"

          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "$notes" \
            --generate-notes

  wiki-publish:
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Export wiki markdown
        run: make wiki-export
        env:
          GOSITE_REPO: ${{ github.repository }}
          GOSITE_BRANCH: ${{ github.ref_name }}

      - name: Validate wiki export
        run: |
          set -euo pipefail
          test -f docs/wiki-export/Home.md
          test -f docs/wiki-export/Home-id.md
          test -f docs/wiki-export/_Sidebar.md
          count="$(find docs/wiki-export -maxdepth 1 -name '*.md' | wc -l)"
          echo "Exported ${count} markdown files"
          test "${count}" -ge 20

      - name: Push to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GOSITE_REPO: ${{ github.repository }}
        run: bash scripts/push-wiki.sh
