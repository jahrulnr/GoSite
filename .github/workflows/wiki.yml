name: Sync GitHub Wiki

on:
  push:
    paths:
      - 'docs/**'
      - '!docs/wiki-export/**'
      - 'docs/export-wiki.sh'
      - 'scripts/push-wiki.sh'
      - 'Makefile'
      - '.github/workflows/wiki.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '!docs/wiki-export/**'
      - 'docs/export-wiki.sh'
      - 'scripts/push-wiki.sh'
      - 'Makefile'
      - '.github/workflows/wiki.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: Push exported pages to GitHub Wiki (default off; master pushes publish automatically)
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: wiki-${{ github.repository }}-${{ github.event_name == 'push' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export wiki markdown
        run: make wiki-export
        env:
          GOSITE_REPO: ${{ github.repository }}
          GOSITE_BRANCH: ${{ github.ref_name }}

      - name: Validate wiki export
        run: |
          set -euo pipefail
          test -f docs/wiki-export/Home.md
          test -f docs/wiki-export/Home-id.md
          test -f docs/wiki-export/_Sidebar.md
          count="$(find docs/wiki-export -maxdepth 1 -name '*.md' | wc -l)"
          echo "Exported ${count} markdown files"
          test "${count}" -ge 20

      - name: Push to GitHub Wiki
        if: >-
          (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'))
          || (github.event_name == 'workflow_dispatch' && inputs.publish)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GOSITE_REPO: ${{ github.repository }}
        run: bash scripts/push-wiki.sh
